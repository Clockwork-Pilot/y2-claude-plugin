[pytest]
minversion = 7.0
addopts =
    -v
    --strict-markers
    --tb=short
testpaths =
    tasks_scripts/tests
    hooks/tests
    knowledge_tools
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
