[pytest]
minversion = 7.0
pythonpath = . knowledge_tool/knowledge_tool/src
addopts =
    -v
    --strict-markers
    --tb=short
testpaths =
    knowledge_tool/knowledge_tool/tests
    tasks_lifecycle/tools
    pycov
    constraints_tool/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
